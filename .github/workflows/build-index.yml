name: Build Settings Index

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      sources:
        description: "Sources to fetch (all | graph | chromium | admx | office | custom)"
        required: false
        default: "all"
  push:
    paths:
      - "scripts/build_index.py"
      - "custom_sources.json"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build Index & Deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run index builder
        env:
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
        run: |
          SOURCES="${{ github.event.inputs.sources || 'all' }}"
          echo "Building index with sources: $SOURCES"
          python scripts/build_index.py --sources "$SOURCES"

      - name: Copy data into public for Pages deployment
        run: |
          echo "Copying data/ into public/ so Pages can serve it…"
          cp -r data/ public/data/
          echo "Contents of public/:"
          ls -lh public/
          echo "Chunks count: $(ls public/data/chunks/ | wc -l)"

      - name: Commit updated data files back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No data changes to commit" && exit 0
          git commit -m "chore: update settings index [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload public folder as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
